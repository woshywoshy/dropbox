<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EGM Dropbox Clearance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-alt: #222632;
    --border: #2e3344;
    --border-focus: #5b8def;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-muted: #4a5068;
    --accent: #5b8def;
    --accent-glow: rgba(91, 141, 239, 0.15);
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.08);
    --red: #f87171;
    --disabled-bg: #14161e;
    --disabled-text: #333750;
    --coin-gold: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 12px) 16px 12px;
  }

  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title .coin-icon {
    width: 20px; height: 20px;
    background: var(--coin-gold);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #1a1d27;
    font-weight: 700;
  }

  .controls-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 10px;
  }

  .field-group {
    flex: 1;
    min-width: 0;
  }

  .field-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 6px;
    outline: none;
    transition: border-color 0.2s;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .field-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .total-display {
    background: var(--green-bg);
    border: 1px solid rgba(52, 211, 153, 0.25);
    color: var(--green);
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 11px 8px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-calc {
    background: var(--accent);
    color: #fff;
  }

  .btn-clear {
    background: var(--surface);
    color: var(--red);
    border: 1px solid rgba(248, 113, 113, 0.25);
  }

  .btn-print {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  /* ── Summary strip ── */
  .summary-strip {
    display: flex;
    gap: 1px;
    background: var(--border);
    margin: 0;
  }

  .summary-item {
    flex: 1;
    background: var(--surface);
    padding: 10px 8px;
    text-align: center;
  }

  .summary-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
  }

  .summary-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Table ── */
  .table-wrap {
    padding: 0;
  }

  .tbl-header {
    display: grid;
    grid-template-columns: 52px 1fr 1fr 1fr;
    gap: 0;
    background: var(--surface-alt);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .tbl-header .th {
    background: var(--surface-alt);
    padding: 10px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-align: center;
  }

  .tbl-body {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
  }

  .tbl-row {
    display: grid;
    grid-template-columns: 52px 1fr 1fr 1fr;
    gap: 0;
  }

  .tbl-row .cell {
    background: var(--bg);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
  }

  .egm-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .egm-num.coinless {
    color: var(--text-muted);
  }

  .cell-input {
    width: 100%;
    height: 100%;
    min-height: 44px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    outline: none;
    padding: 8px 4px;
  }

  .cell-input:focus {
    background: var(--accent-glow);
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .cell-input::placeholder {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 12px;
  }

  .cell-input:disabled {
    background: transparent;
    color: var(--disabled-text);
    cursor: not-allowed;
  }

  .cell-input:disabled::placeholder {
    color: transparent;
  }

  .tbl-row.coinless-row .cell:nth-child(2) {
  }

  .coinless-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(251, 191, 36, 0.08);
    border: 1px solid rgba(251, 191, 36, 0.2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--amber);
    white-space: nowrap;
  }

  .coinless-badge svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .tbl-row.has-value .cell:nth-child(2) {
  }

  /* Row numbering stripe */
  .tbl-row:nth-child(even) .cell {
    background: var(--surface);
  }

  /* ── Variance section ── */
  .variance-section {
    padding: 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .variance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .variance-row:last-child { border-bottom: none; }

  .variance-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .variance-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
  }

  .variance-val.positive { color: var(--green); }
  .variance-val.negative { color: var(--red); }
  .variance-val.zero { color: var(--text-dim); }

  /* ── Footer ── */
  .footer-pad {
    height: 100px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    z-index: 1000;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Print layout (hidden on screen) ── */
  .print-layout { display: none; }

  @media print {
    @page {
      size: A4 portrait;
      margin: 6mm 6mm;
    }

    /* Hide screen UI */
    .header, .table-wrap, .footer-pad, .toast { display: none !important; }

    /* Show print layout */
    .print-layout { display: block !important; }

    body { background: #fff; color: #000; font-family: 'DM Sans', Arial, sans-serif; margin: 0; padding: 0; }

    .print-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1.5px solid #000;
      padding-bottom: 5px;
      margin-bottom: 5px;
    }

    .print-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .print-meta {
      display: flex;
      gap: 8px;
    }

    .print-meta-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 12px;
      min-width: 90px;
    }

    .print-meta-label {
      font-size: 7px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #777;
    }

    .print-meta-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #000;
    }

    .print-columns {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .print-table {
      flex: 1;
      border-collapse: collapse;
      font-size: 8.5px;
      table-layout: fixed;
      width: 50%;
    }

    .print-table th {
      background: #e8e8e8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 7.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 2px;
      text-align: center;
      border: 0.5px solid #ccc;
    }

    .print-table td {
      padding: 2.5px 3px;
      text-align: center;
      border: 0.5px solid #ddd;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      height: 16px;
      line-height: 16px;
    }

    .print-table tr:nth-child(even) td {
      background: #f5f5f5;
    }

    .print-table td:first-child {
      font-weight: 700;
      width: 30px;
    }

    .print-table td.coinless-cell {
      padding: 1px 2px;
    }

    .print-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      gap: 1.5px;
      padding: 0px 3px;
      border-radius: 20px;
      background: #fef8e7;
      border: 0.5px solid #d4c48a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 4px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #a08520;
      white-space: nowrap;
      line-height: 1;
      height: 8px;
    }

    .print-badge svg {
      width: 4px;
      height: 4px;
      flex-shrink: 0;
      vertical-align: middle;
      display: block;
    }

    .print-table td.empty-cell {
      padding: 1px 2px;
    }

    .empty-badge {
      background: #eef2f7 !important;
      border-color: #b0bec5 !important;
      color: #607d8b !important;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <span class="coin-icon">$</span>
    EGM Dropbox Clearance
  </div>
  <div class="controls-row">
    <div class="field-group">
      <div class="field-label">Date</div>
      <input type="date" id="dropDate" class="field-input">
    </div>
    <div class="field-group">
      <div class="field-label">Total Coins</div>
      <input type="number" id="totalCoins" class="field-input total-display" placeholder="0" inputmode="numeric">
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-calc" onclick="calculate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16v16H4z" rx="2"/><path d="M8 8h8M8 12h8M8 16h4"/></svg>
      Calculate
    </button>
    <button class="btn btn-clear" onclick="clearAll()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      Clear
    </button>
    <button class="btn btn-print" onclick="preparePrint()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
  </div>
</div>



<div class="table-wrap">
  <div class="tbl-header">
    <div class="th">EGM</div>
    <div class="th">Coins</div>
    <div class="th">Hopper</div>
    <div class="th">Notes</div>
  </div>
  <div class="tbl-body" id="tableBody"></div>
</div>

<div class="footer-pad"></div>
<div class="toast" id="toast"></div>

<!-- Print-only two-column layout -->
<div class="print-layout" id="printLayout">
  <div class="print-header">
    <div class="print-title">EGM Dropbox Clearance</div>
    <div class="print-meta">
      <div class="print-meta-box"><span class="print-meta-label">Date</span><span class="print-meta-value" id="printDate"></span></div>
      <div class="print-meta-box"><span class="print-meta-label">Total Coins</span><span class="print-meta-value" id="printTotal"></span></div>
    </div>
  </div>
  <div class="print-columns">
    <table class="print-table" id="printTableLeft">
      <thead>
        <tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <table class="print-table" id="printTableRight">
      <thead>
        <tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const COINLESS = new Set([10,11,12,13,14,15,19,25,26,27,28,43,50,55,60,61,62,69,70,71]);
  const TOTAL_MACHINES = 77;

  // Set today's date
  const dateInput = document.getElementById('dropDate');
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  dateInput.value = `${yyyy}-${mm}-${dd}`;

  // Build table
  const tableBody = document.getElementById('tableBody');
  const fragment = document.createDocumentFragment();

  for (let i = 1; i <= TOTAL_MACHINES; i++) {
    const isCoinless = COINLESS.has(i);
    const row = document.createElement('div');
    row.className = 'tbl-row' + (isCoinless ? ' coinless-row' : '');
    row.id = `row-${i}`;

    row.innerHTML = `
      <div class="cell">
        <span class="egm-num ${isCoinless ? 'coinless' : ''}">${i}</span>
      </div>
      <div class="cell">
        ${isCoinless
          ? `<span class="coinless-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="4" y1="4" x2="20" y2="20"/></svg>Coinless</span>`
          : `<input type="number" class="cell-input coin-input" id="coin-${i}"
               inputmode="numeric" pattern="[0-9]*"
               placeholder="—"
               data-egm="${i}"
               onfocus="scrollToInput(this)"
               oninput="onCoinInput(this)">`
        }
      </div>
      <div class="cell">
        <input type="text" class="cell-input" disabled placeholder="">
      </div>
      <div class="cell">
        <input type="text" class="cell-input" disabled placeholder="">
      </div>
    `;

    fragment.appendChild(row);
  }

  tableBody.appendChild(fragment);

  function scrollToInput(el) {
    setTimeout(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }

  function onCoinInput(el) {
    const row = document.getElementById(`row-${el.dataset.egm}`);
    if (el.value && el.value !== '0') {
      row.classList.add('has-value');
    } else {
      row.classList.remove('has-value');
    }
  }

  function calculate() {
    let countedSum = 0;

    for (let i = 1; i <= TOTAL_MACHINES; i++) {
      if (COINLESS.has(i)) continue;
      const input = document.getElementById(`coin-${i}`);
      const val = parseFloat(input.value) || 0;
      countedSum += val;
    }

    document.getElementById('totalCoins').value = countedSum;
    showToast('Total: $' + countedSum.toLocaleString());
  }

  function clearAll() {
    if (!confirm('Clear all coin entries?')) return;

    for (let i = 1; i <= TOTAL_MACHINES; i++) {
      if (COINLESS.has(i)) continue;
      const input = document.getElementById(`coin-${i}`);
      input.value = '';
      document.getElementById(`row-${i}`).classList.remove('has-value');
    }

    document.getElementById('totalCoins').value = '';
    showToast('All entries cleared');
  }

  function preparePrint() {
    // Populate print header
    const dateVal = document.getElementById('dropDate').value;
    document.getElementById('printDate').textContent = dateVal || '—';
    document.getElementById('printTotal').textContent = document.getElementById('totalCoins').value || '0';

    // Split 77 machines into two columns: 1-39 left, 40-77 right
    const splitAt = 39;
    const leftBody = document.querySelector('#printTableLeft tbody');
    const rightBody = document.querySelector('#printTableRight tbody');
    leftBody.innerHTML = '';
    rightBody.innerHTML = '';

    for (let i = 1; i <= TOTAL_MACHINES; i++) {
      const isCoinless = COINLESS.has(i);
      let coinVal = '';
      if (isCoinless) {
        coinVal = '<td class="coinless-cell"><span class="coinless-badge print-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="4" y1="4" x2="20" y2="20"/></svg>Coinless</span></td>';
      } else {
        const input = document.getElementById(`coin-${i}`);
        const val = input.value;
        if (!val || parseFloat(val) === 0) {
          coinVal = '<td class="empty-cell"><span class="empty-badge print-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Empty</span></td>';
        } else {
          coinVal = `<td>${val}</td>`;
        }
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i}</td>${coinVal}<td></td><td></td>`;

      if (i <= splitAt) {
        leftBody.appendChild(tr);
      } else {
        rightBody.appendChild(tr);
      }
    }

    // Right table has 38 rows (40-77), add 1 empty row to match left table's 39
    const emptyTr = document.createElement('tr');
    emptyTr.innerHTML = '<td></td><td></td><td></td><td></td>';
    rightBody.appendChild(emptyTr);

    window.print();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }
</script>

</body>
</html>
